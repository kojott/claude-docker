services:
  claude:
    build: .
    image: ghcr.io/kojott/claude-docker:latest
    container_name: claude-dev
    hostname: claude-dev
    stdin_open: true
    tty: true
    env_file: .env
    environment:
      - GIT_USER_NAME=${GIT_USER_NAME:-Claude Dev}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-dev@localhost}
      - CLAUDE_AUTOSTART=${CLAUDE_AUTOSTART:-0}
    volumes:
      - ${PROJECTS_DIR:-./projects}:/work
      - claude-home:/home/dev/.claude
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - AUDIT_WRITE
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-8g}
          cpus: "${CPU_LIMIT:-4.0}"
        reservations:
          memory: 2g
    ports:
      - "${PORT_DEV1:-3000}:3000"
      - "${PORT_DEV2:-5173}:5173"
      - "${PORT_DEV3:-8080}:8080"
    restart: unless-stopped

volumes:
  claude-home:
