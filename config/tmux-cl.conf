# cl session manager - tmux configuration
# Part of claude-docker

# Source user config first (if exists)
if-shell "test -f ~/.tmux.conf" "source-file ~/.tmux.conf"

# Terminal and color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g focus-events on

# Mouse support
set -g mouse on

# Cursor shape passthrough
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Clipboard: OSC 52 (works across Docker, SSH, nested tmux — no socket mounts needed)
# Supported: iTerm2, Windows Terminal, Ghostty, Kitty, Alacritty, WezTerm, foot
# Not supported: GNOME Terminal, XFCE Terminal (VTE-based) — silently ignored
set -g set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\a'
# Note: allow-passthrough enables ALL escape sequence passthrough, not just OSC 52.
# This is safe when the terminal is trusted (iTerm2, Ghostty, etc. filter dangerous sequences).
set -g allow-passthrough on

# Copy-mode: selections auto-copy to host clipboard via OSC 52
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# X11/Wayland fallback: override copy command if CLIPBOARD_BACKEND is set
if-shell '[ "$CLIPBOARD_BACKEND" = "x11" ] && command -v xclip >/dev/null 2>&1' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"'
if-shell '[ "$CLIPBOARD_BACKEND" = "wayland" ] && command -v wl-copy >/dev/null 2>&1' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"'

# Increase scrollback buffer
set -g history-limit 50000

# Reduce escape time (faster key response)
set -sg escape-time 10

# Status bar
set -g status-style 'bg=colour235 fg=colour136'
set -g status-left '#[fg=colour39,bold] #S #[fg=colour245]| '
set -g status-left-length 30
set -g status-right '#[fg=colour245]%H:%M '
set -g status-right-length 20

# Pane border colors
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour39'
